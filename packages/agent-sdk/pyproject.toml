[project]
name = "hope-agent-sdk"
# might change name in future
version = "1.1.0"
description = "Agent SDK — pure agent logic, infra-agnostic"
readme = "README.md"
authors = [{ name = "Suraj Airi", email = "surajairi.ml@gmail.com" }]
requires-python = ">=3.12"
# fix later before going public to >=3.10

dependencies = ["loguru>=0.7.0", "pydantic>=2.13.4"]

[project.optional-dependencies]
# Install with: pip install hope-agent-sdk[litellm]
litellm = ["litellm>=1.0.0"]
# Install with: pip install hope-agent-sdk[langgraph]
langgraph = ["langgraph>=0.2.0", "langchain-core>=0.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_sdk"]
