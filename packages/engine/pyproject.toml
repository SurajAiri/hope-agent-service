[project]
name = "engine"
version = "0.2.0"
description = "Engine — core execution foundation (singleton)"
readme = "README.md"
authors = [{ name = "Suraj Airi", email = "surajairi.ml@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "hope-agent-sdk",
    "redis[hiredis]>=5.0.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.29.0",
    "boto3>=1.34.0",
    "httpx>=0.27.0",
    "loguru>=0.7.0",
    "pydantic>=2.13.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/engine"]

[tool.uv.sources]
hope-agent-sdk = { workspace = true }
